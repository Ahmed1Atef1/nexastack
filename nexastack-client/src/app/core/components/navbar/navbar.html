<header class="navbar">
  <div class="container navbar-container">
    <!-- Brand / Logo -->
    <a class="navbar-brand" (click)="scrollTo('hero')" style="cursor: pointer;">
      <span class="brand-text">Nexa</span><span class="brand-text-accent">Stack</span>
    </a>

    <!-- Desktop Navigation -->
    <nav class="navbar-nav desktop-nav">
      <ul class="nav-list">
        <li class="nav-item">
          <a class="nav-link" [class.active]="activeSection === 'hero'" (click)="scrollTo('hero')">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" [class.active]="activeSection === 'services'" (click)="scrollTo('services')">Services</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" [class.active]="activeSection === 'about'" (click)="scrollTo('about')">About</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" [class.active]="activeSection === 'portfolio'" (click)="scrollTo('portfolio')">Work</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" [class.active]="activeSection === 'contact'" (click)="scrollTo('contact')">Contact</a>
        </li>
      </ul>
    </nav>

    <!-- Theme Toggle & Mobile Menu -->
    <div class="navbar-actions">
      <!-- Theme Toggle -->
      <button class="theme-toggle" (click)="toggleTheme()" [attr.aria-label]="isDarkMode ? 'Switch to light mode' : 'Switch to dark mode'">
        @if (isDarkMode) {
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        }
      </button>

      <!-- Mobile Menu Toggle Button -->
      <button class="mobile-toggle" (click)="toggleMobileMenu()" aria-label="Toggle navigation">
        <span class="hamburger" [class.is-active]="isMobileMenuOpen"></span>
      </button>
    </div>
  </div>

  <!-- Mobile Navigation Dropdown -->
  <div class="mobile-nav" [class.is-open]="isMobileMenuOpen">
    <div class="container">
      <ul class="mobile-nav-list">
        <li><a class="mobile-nav-link" [class.active]="activeSection === 'hero'" (click)="scrollTo('hero')">Home</a></li>
        <li><a class="mobile-nav-link" [class.active]="activeSection === 'services'" (click)="scrollTo('services')">Services</a></li>
        <li><a class="mobile-nav-link" [class.active]="activeSection === 'about'" (click)="scrollTo('about')">About</a></li>
        <li><a class="mobile-nav-link" [class.active]="activeSection === 'portfolio'" (click)="scrollTo('portfolio')">Work</a></li>
        <li><a class="mobile-nav-link" [class.active]="activeSection === 'contact'" (click)="scrollTo('contact')">Contact</a></li>
      </ul>
    </div>
  </div>
</header>
